<!doctype html><html lang="es"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Invitación | Fiesta</title><meta name="description" content="Invitación de casamiento"/><link rel="stylesheet" href="styles.css"/></head><body data-page="fiesta">
<header class="nav">
  <div class="wrap">
    <div class="row">
      <div class="brand" id="brandText">Invitación</div>
      <nav class="links" aria-label="Navegación principal">
        <a data-nav="home" href="index.html">Inicio</a>
        <a data-nav="civil" href="civil.html">Civil</a>
        <a data-nav="ceremonia" href="ceremonia.html">Iglesia</a>
        <a data-nav="fiesta" href="fiesta.html">Fiesta</a>
        <a data-nav="zona" href="zona.html">Zona</a>
        <a data-nav="regalos" href="regalos.html">Regalos</a>
        <a data-nav="rsvp" href="rsvp.html">RSVP</a>
      </nav>
    </div>
  </div>
</header>
<main class="page">
  <div class="wrap pageInner">
    <div class="media"><div class="photoFrame"><img id="eventImg" alt="Foto de la sección"/></div></div>
    <section class="textCard">
      <div class="eyebrow" id="eventTipo">—</div>
      <h2 id="eventTitulo">—</h2>
      <p class="meta"><strong id="eventFecha">—</strong> · <span id="eventHora">—</span></p>
      <p id="eventLugar">—</p>
      <p class="muted" id="eventDireccion">—</p>
      <p class="phrase" id="eventFrase">—</p>
      <div class="btns"><a class="btn" id="eventMaps" href="#" target="_blank" rel="noopener">Cómo llegar</a></div>
    </section>
  </div>
</main>
<dialog id="rsvpModal">
  <div class="modalHead">
    <div class="modalTitle">RSVP</div>
    <button class="x" id="btnCloseRsvp" type="button">✕</button>
  </div>
  <div class="modalBody">
    <p class="muted">Por favor completá los campos. Te pedimos confirmar antes del <span id="rsvpDeadline">—</span>.</p>
    <form id="rsvpForm" method="POST">
      <label>Nombre y apellido</label>
      <input name="nombre" required placeholder="Tu nombre" />
      <label>¿Asistís?</label>
      <select name="asistencia" required>
        <option value="" selected disabled>Elegí una opción</option>
        <option>Asistiré</option>
        <option>No asistiré</option>
      </select>
      <label>Menú especial</label>
      <select name="menu">
        <option>Ninguno</option><option>Celíaco</option><option>Vegetariano</option><option>Vegano</option><option>Diabético</option>
      </select>
      <label>Comentarios</label>
      <textarea name="comentarios" placeholder="Ej: voy con X, llego tarde, etc."></textarea>
      <input type="hidden" name="_subject" value="RSVP - Invitación" />
      <input type="hidden" name="_template" value="table" />
      <div class="modalActions">
        <button class="btn primary" type="submit">Enviar RSVP</button>
        <button class="btn" type="button" id="btnCancelRsvp">Cancelar</button>
      </div>
      <p class="small" id="rsvpStatus"></p>
    </form>
  </div>
</dialog>
<footer><div class="wrap">Hecho con ♥ — invitación multipágina.</div></footer>
<script src="app.js"></script>
</body>
</html>
